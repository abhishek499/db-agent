<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="32" height="32" rx="7" fill="url(#g)"/>

  <!-- Cylinder body -->
  <rect x="8" y="12" width="16" height="12" fill="rgba(255,255,255,0.72)"/>

  <!-- Top cap (brightest — the "lid") -->
  <ellipse cx="16" cy="12" rx="8" ry="2.6" fill="white"/>

  <!-- Middle ring separator -->
  <ellipse cx="16" cy="18" rx="8" ry="2.6"
    fill="rgba(255,255,255,0.08)"
    stroke="rgba(255,255,255,0.45)"
    stroke-width="0.7"/>

  <!-- Bottom cap -->
  <ellipse cx="16" cy="24" rx="8" ry="2.6" fill="rgba(255,255,255,0.88)"/>

  <!-- AI sparkle (4-pointed star, top-right) -->
  <path d="M25.5 5.2 L26.1 6.5 L27.4 7 L26.1 7.5 L25.5 8.8 L24.9 7.5 L23.6 7 L24.9 6.5 Z"
    fill="rgba(255,255,255,0.92)"/>
</svg>
